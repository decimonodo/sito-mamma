<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Gerardina Zaccanigno – Arte su tela</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: 'Segoe UI', Arial;
}

header {
  text-align: center;
  padding: 80px 20px 40px;
}

header h1 {
  margin: 0;
  font-size: 42px;
}

header p {
  color: #aaa;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
  padding: 40px;
  max-width: 1200px;
  margin: 0 auto;
}

/* CARD */
.card {
  background: #111;
  border-radius: 12px;
  overflow: hidden;
}

.card:hover {
  transform: scale(1.03);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

/* INFO */
.info {
  padding: 15px;
  text-align: center;
  color: #ccc;
}

/* WHATSAPP */
.whatsapp {
  text-align: center;
  margin: 60px;
}

.whatsapp a {
  background: #25D366;
  color: white;
  padding: 15px 30px;
  text-decoration: none;
  border-radius: 8px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  top: 0;
  left: 0;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  margin: 5% auto;
  display: block;
}

.modal:target {
  display: block;
}
</style>
</head>

<body>

<header>
  <h1>Gerardina Zaccanigno</h1>
  <p>Arte su tela</p>
</header>

<section class="gallery">

  <div class="card">
    <a href="#img1"><img src="madonna.jpeg"></a>
    <div class="info">Madonna</div>
  </div>

  <div class="card">
    <a href="#img2"><img src="sadhu.jpeg"></a>
    <div class="info">Sadhu</div>
  </div>

  <div class="card">
    <a href="#img3"><img src="mani.jpeg"></a>
    <div class="info">Mani</div>
  </div>

  <div class="card">
    <a href="#img4"><img src="musicista.jpeg"></a>
    <div class="info">Musicista</div>
  </div>

  <div class="card">
    <a href="#img5"><img src="stanza.jpeg"></a>
    <div class="info">Interno</div>
  </div>

  <div class="card">
    <a href="#img6"><img src="violinista.jpeg"></a>
    <div class="info">Violinista</div>
  </div>

</section>

<div class="whatsapp">
  <a href="https://wa.me/393281868258">Contattami</a>
</div>

<!-- MODALI -->

<div id="img1" class="modal"><a href="#"><img src="madonna.jpeg"></a></div>
<div id="img2" class="modal"><a href="#"><img src="sadhu.jpeg"></a></div>
<div id="img3" class="modal"><a href="#"><img src="mani.jpeg"></a></div>
<div id="img4" class="modal"><a href="#"><img src="musicista.jpeg"></a></div>
<div id="img5" class="modal"><a href="#"><img src="stanza.jpeg"></a></div>
<div id="img6" class="modal"><a href="#"><img src="violinista.jpeg"></a></div>

</body>
</html>
