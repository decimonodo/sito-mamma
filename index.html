<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Gerardina Zaccanigno – Arte su tela</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: 'Segoe UI', Arial;
}

/* HEADER */
header {
  text-align: center;
  padding: 80px 20px 40px;
}

header h1 {
  margin: 0;
  font-size: 40px;
  letter-spacing: 2px;
}

header p {
  color: #aaa;
  margin-top: 10px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
  padding: 40px;
  max-width: 1200px;
  margin: 0 auto;
}

/* CARD */
.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.03);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 350px;
  object-fit: cover;
  transition: 0.4s;
}

.card img:hover {
  transform: scale(1.05);
}

/* INFO */
.info {
  padding: 15px;
  text-align: center;
  color: #ccc;
  font-size: 18px;
}

/* WHATSAPP */
.whatsapp {
  text-align: center;
  margin: 60px;
}

.whatsapp a {
  background: #25D366;
  color: white;
  padding: 15px 30px;
  text-decoration: none;
  border-radius: 8px;
  font-size: 18px;
  transition: 0.3s;
}

.whatsapp a:hover {
  background: #1ebe5d;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 60px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.95);
}

.modal-content {
  margin: auto;
  display: block;
  max-width: 90%;
  max-height: 85%;
}

.modal:target {
  display: block;
}
</style>
</head>

<body>

<header>
  <h1>Gerardina Zaccanigno</h1>
  <p>Arte su tela</p>
</header>

<section class="gallery">

  <div class="card">
    <a href="#img1">
      <img src="madonna.jpeg">
    </a>
    <div class="info">Madonna</div>
  </div>

  <div class="card">
    <a href="#img2">
      <img src="sadhu.jpeg">
    </a>
    <div class="info">Sadhu</div>
  </div>

  <div class="card">
    <a href="#img3">
      <img src="mani.jpeg">
    </a>
    <div class="info">Mani</div>
  </div>

  <div class="card">
    <a href="#img4">
      <img src="musicista.jpeg">
    </a>
    <div class="info">Musicista</div>
  </div>

  <div class="card">
    <a href="#img5">
      <img src="stanza.jpeg">
    </a>
    <div class="info">Interno</div>
  </div>

  <div class="card">
    <a href="#img6">
      <img src="violinista.jpeg">
    </a>
    <div class="info">Violinista</div>
  </div>

</section>

<div class="whatsapp">
  <a href="https://wa.me/393281868258">Contattami</a>
</div>

<!-- MODAL IMMAGINI -->

<div id="img1" class="modal">
  <a href="#"><img class="modal-content" src="madonna.jpeg"></a>
</div>

<div id="img2" class="modal">

<div id="img3" class="modal">

<div id="img6" class="modal">

</body>
</html>
